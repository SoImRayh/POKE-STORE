SPRING_MAIL_HOST: ${ENV_SPRING_MAIL_HOST}

spring:
  application:
    name: cardstore
  security:
    oauth2:
      resourceserver:
        opaquetoken:
          client-secret: $M/s&Q7<_JQW|bhE;aEg8niEC]vS79m4m@|A^e-sQ,#
  cache:
    type: redis
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000
  jpa:
    hibernate:
      ddl-auto: update
  docker:
    compose:
      file: "./compose.yaml"

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer



server:
  port: 8081

  